  description_long: |
    FHIRLint is a cross-platform desktop application for validating and
    analysing FHIR bundles against the Medizininformatik-Initiative (MII)
    Kerndatensatz standards used in German university hospitals.

    Built as a rapid prototype to demonstrate FHIR expertise and healthcare
    data quality analysis, it processes thousands of bundles efficiently
    with a GUI interface and exports professional HTML and JSON reports.

    ## Key Features

    - **FHIR bundle validation** — parses and validates FHIR Bundle resources
      against MII Kerndatensatz profiles
    - **MII profile detection** — automatically identifies MII modules:
      Person, Fall, Diagnose, and Medikation
    - **38+ quality checks** — required field validation, date format
      checking, ICD-10-GM code format, reference integrity, and German
      postal code validation
    - **Batch processing** — handles thousands of bundles efficiently with
      real-time progress display
    - **Report export** — generates HTML and JSON reports that auto-open
      in the browser on completion

    ## Tested On

    1,651 real POLAR FHIR bundles from an MII use case, achieving 100%
    validation pass rate with all MII modules detected.

    ## Status

    Stable prototype. Published with a DOI via Zenodo. Not intended for
    production use — see the README for planned V2 enhancements including
    full StructureDefinition validation and CLI mode.